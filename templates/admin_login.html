<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Path Finder Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #090d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Grid pattern overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(99,102,241,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow blobs */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }
        .glow-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.3), transparent 70%);
            top: -100px; left: -100px;
        }
        .glow-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 70%);
            bottom: -80px; right: -80px;
        }

        /* Card */
        .login-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2.75rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.1);
        }

        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .lock-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border-radius: 14px;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 24px rgba(99,102,241,0.35);
        }

        .card-header h2 {
            font-family: 'DM Serif Display', serif;
            color: #f1f5f9;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: -0.3px;
            margin-bottom: 4px;
        }

        .card-header p {
            color: #64748b;
            font-size: 0.82rem;
        }

        /* Error */
        .error {
            background: rgba(220, 38, 38, 0.12);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
        }

        /* Input Group */
        .input-group {
            margin-bottom: 1.1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 7px;
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 9px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: #f1f5f9;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .input-group input::placeholder {
            color: #334155;
        }

        .input-group input:focus {
            border-color: #6366f1;
            background: rgba(99,102,241,0.07);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 13px;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: white;
            border: none;
            border-radius: 9px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 16px rgba(99,102,241,0.3);
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(99,102,241,0.45);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 1.5rem 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.07);
        }

        .divider span {
            color: #334155;
            font-size: 0.75rem;
        }

        /* Back link */
        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #6366f1;
            text-decoration: none;
            font-size: 0.83rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #818cf8;
        }

        /* Footer tag */
        .card-footer-tag {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            color: #1e293b;
            font-size: 0.72rem;
        }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="login-card">
        <div class="card-header">
            <div class="lock-icon">🔐</div>
            <h2>Admin Access</h2>
            <p>Path Finder Academy — Secure Portal</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••••">
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        <div class="divider"><span>or</span></div>

        <a href="/" class="back-link">← Back to Admission Form</a>

        <div class="card-footer-tag">Path Finder Academy © 2025 — Admin Panel</div>
    </div>

</body>
</html>
